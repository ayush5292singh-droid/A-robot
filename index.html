<!DOCTYPE html>
<html>
<head>
<title>Robo AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🤖 Robo AI</h1>

<div class="robot">

<div class="head">
<div class="eyes">
<span></span>
<span></span>
</div>

<div id="mouth"></div>

</div>

<div class="body">
</div>

</div>


<div id="chat">
<p>Robot: Hello! I am Robo AI.</p>
</div>

<select id="language" onchange="changeLanguage()">

<option value="en-US">🇬🇧 English</option>

<option value="hi-IN">🇮🇳 Hindi</option>

<option value="es-ES">🇪🇸 Spanish</option>

<option value="fr-FR">🇫🇷 French</option>

</select>
<div class="controls">

<button onclick="setMode('repeat')">
🔁 Repeat Mode
</button>

<button onclick="setMode('question')">
🧠 Question Mode
</button>

</div>


<div class="inputbox">

<input id="text" placeholder="Type message...">

<button onclick="sendMessage()">
Send
</button>

<button onclick="startVoice()">
🎤
</button>

</div>


</div>

<script src="script.js"></script>

</body>
</html>
